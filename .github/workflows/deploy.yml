name: Build and deploy

on:
  push:
    branches: [main]
  schedule:
    # Varje timme — full berikning körs bara i 05-körningen (se budgetsteget)
    - cron: '10 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Persistent enrichment cache (Wayback + DNS + Ahrefs DR)
      - name: Restore enrichment cache
        id: cache-enrichment
        uses: actions/cache@v4
        with:
          path: cache
          key: enrichment-${{ github.run_id }}
          restore-keys: |
            enrichment-

      # Timvisa körningar uppdaterar nysläppta + tillgänglighet med lätt budget;
      # den fulla berikningen (Wayback + stor DNS-batch) körs kl 05 UTC
      - name: Choose enrichment budget
        run: |
          if [ "$(date -u +%H)" = "05" ]; then
            echo "WAYBACK_MAX=1000" >> "$GITHUB_ENV"
            echo "DNS_MAX=10000" >> "$GITHUB_ENV"
            # Extrahera högst en äldre Common Crawl-årsgraph. Pending-filen
            # importeras rullande innan nästa stora graph hämtas.
            echo "CC_HISTORY_DOWNLOADS=1" >> "$GITHUB_ENV"
          else
            echo "WAYBACK_MAX=0" >> "$GITHUB_ENV"
            echo "DNS_MAX=1000" >> "$GITHUB_ENV"
            echo "CC_HISTORY_DOWNLOADS=0" >> "$GITHUB_ENV"
          fi
          # Nya discovery-kandidater importeras i samma takt som DAS-kön
          # kontrolleras, så cache och körtid växer kontrollerat.
          echo "DISCOVERY_IMPORT_MAX=5000" >> "$GITHUB_ENV"
          echo "RANKED_AVAIL_MAX=5000" >> "$GITHUB_ENV"
          # Gratis DR-endpoint, strypt till under Ahrefs gräns 60 anrop/minut.
          # 1 000 anrop tar cirka 18 minuter och kortar den första backfillen
          # från ungefär 24 dagar till mindre än 2 dagar.
          echo "AHREFS_DR_MAX=1000" >> "$GITHUB_ENV"

      - name: Fetch data and build SQLite
        env:
          AHREFS_API_KEY: ${{ secrets.AHREFS_API_KEY }}
        run: npm run build:data

      - name: Save enrichment cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: cache
          key: enrichment-${{ github.run_id }}

      - name: Build site
        run: npm run build:site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
