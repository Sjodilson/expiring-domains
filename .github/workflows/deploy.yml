name: Build and deploy

on:
  push:
    branches: [main]
  schedule:
    # Dagligen 05:00 UTC (~07:00 svensk tid)
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Persistent enrichment cache (Wayback + DNS resultat)
      - name: Restore enrichment cache
        id: cache-enrichment
        uses: actions/cache@v4
        with:
          path: cache
          key: enrichment-${{ github.run_id }}
          restore-keys: |
            enrichment-

      - name: Fetch data and build SQLite
        run: npm run build:data
        env:
          # Mängd domäner att berika per körning (resten görs nästa dag)
          WAYBACK_MAX: '2500'
          DNS_MAX: '10000'

      - name: Save enrichment cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: cache
          key: enrichment-${{ github.run_id }}

      - name: Build site
        run: npm run build:site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
